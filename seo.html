<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>林果良品｜SEO 監控</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--green:#284234;--dark:#002721;--sand:#E2CEB9;--sand-light:#F5EDE3;--rust:#A54A1A;--gray-pink:#CFA294;--brown:#8D5531;--bg:#F5EDE3;--surface:#ffffff;--surface2:#FAF5EF;--border:rgba(40,66,52,0.10);--border2:rgba(40,66,52,0.22);--text:#284234;--text-sub:#8D5531;--text-muted:#b09a88;--positive:#1a7a4a;--negative:#c0392b;--warn:#b8860b}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;min-height:100vh}
.hdr{position:sticky;top:0;z-index:100;background:var(--green);height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 2rem}
.brand{display:flex;align-items:center;gap:14px}
.brand-name{font-family:'Space Mono',monospace;font-size:13px;letter-spacing:.1em;color:var(--sand)}
.brand-sep{width:1px;height:16px;background:rgba(226,206,185,.3)}
.brand-sub{font-size:10px;color:var(--gray-pink);font-family:'Space Mono',monospace}
.hdr-r{display:flex;align-items:center;gap:14px}
.back-btn{padding:5px 14px;font-size:11px;font-family:'Space Mono',monospace;color:var(--sand);background:rgba(226,206,185,.12);border:1px solid rgba(226,206,185,.25);border-radius:6px;cursor:pointer;text-decoration:none;transition:all .18s}
.back-btn:hover{background:rgba(226,206,185,.22)}
.data-tag{padding:3px 10px;border-radius:20px;border:1px solid rgba(226,206,185,.25);font-size:10px;font-family:'Space Mono',monospace;color:var(--gray-pink)}
.live-dot{width:7px;height:7px;border-radius:50%;background:#5be8a0;box-shadow:0 0 8px #5be8a0;animation:blink 2.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.hclock{font-family:'Space Mono',monospace;font-size:12px;color:var(--gray-pink)}
.container{max-width:1400px;margin:0 auto;padding:1.75rem 2rem}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.sec-title{font-size:13px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px}
.sec-title::before{content:'';display:block;width:3px;height:14px;background:var(--rust);border-radius:2px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.35rem;margin-bottom:1.25rem}
.card-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.1rem}
.card-lbl{font-size:12px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:7px}
.card-lbl::before{content:'';display:block;width:3px;height:12px;background:var(--rust);border-radius:2px}
/* Tab switcher */
.tab-nav{display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:1.5rem}
.tab-btn{padding:10px 24px;font-size:13px;font-weight:500;color:var(--text-muted);background:transparent;border:none;border-bottom:2px solid transparent;margin-bottom:-2px;cursor:pointer;transition:all .2s;font-family:'Noto Sans TC',sans-serif}
.tab-btn.active{color:var(--green);border-bottom-color:var(--rust);font-weight:700}
.tab-btn:hover:not(.active){color:var(--text-sub)}
.tab-panel{display:none}.tab-panel.active{display:block}
/* Store selector */
.store-pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.25rem}
.sp{padding:5px 14px;font-size:11px;font-family:'Space Mono',monospace;border-radius:20px;border:1px solid var(--border);cursor:pointer;transition:all .18s;background:transparent;color:var(--text-muted)}
.sp:hover{border-color:var(--border2);color:var(--text)}.sp.active{background:var(--green);color:var(--sand);border-color:var(--green)}
/* Keyword table */
.ctbl{width:100%;border-collapse:collapse;font-size:12px}
.ctbl th{text-align:left;padding:8px 12px;font-size:9px;font-family:'Space Mono',monospace;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;border-bottom:2px solid var(--border);background:var(--surface2);white-space:nowrap}
.ctbl td{padding:9px 12px;border-bottom:1px solid var(--border);font-family:'Space Mono',monospace;vertical-align:middle}
.ctbl tr:last-child td{border-bottom:none}
.ctbl tr:hover td{background:var(--surface2)}
.ctbl tr.has-ad{background:rgba(192,57,43,.04)}
.ctbl tr.has-ad:hover td{background:rgba(192,57,43,.08)}
.kw-name{font-family:'Noto Sans TC',sans-serif;font-size:13px;font-weight:600;color:var(--text)}
.rank-num{font-size:18px;font-weight:700}
.rank-good{color:var(--positive)}.rank-ok{color:var(--warn)}.rank-bad{color:var(--negative)}
.rank-delta{font-size:11px;font-weight:700;display:inline-flex;align-items:center;gap:2px}
.delta-up{color:var(--positive)}.delta-down{color:var(--negative)}.delta-same{color:var(--text-muted)}
.vol-badge{font-size:10px;color:var(--text-muted);background:var(--surface2);border:1px solid var(--border);padding:2px 7px;border-radius:4px}
.ad-tag{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:4px;font-size:9px;font-weight:700;font-family:'Space Mono',monospace;letter-spacing:.04em}
.ad-tag.yes{background:rgba(192,57,43,.1);color:var(--negative);border:1px solid rgba(192,57,43,.2)}
.ad-tag.no{background:rgba(26,122,74,.08);color:var(--positive);border:1px solid rgba(26,122,74,.15)}
/* Alert card */
.alert-card{background:rgba(192,57,43,.06);border:1.5px solid rgba(192,57,43,.25);border-radius:10px;padding:1rem 1.25rem;margin-bottom:1.25rem}
.alert-hdr{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:var(--negative);margin-bottom:.75rem}
.alert-row{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid rgba(192,57,43,.1);font-size:12px}
.alert-row:last-child{border-bottom:none}
.alert-kw{font-family:'Noto Sans TC',sans-serif;font-weight:600;color:var(--text)}
.alert-brand{font-family:'Space Mono',monospace;font-size:11px;color:var(--negative);background:rgba(192,57,43,.08);padding:2px 8px;border-radius:4px}
/* Article table */
.art-tbl{width:100%;border-collapse:collapse;font-size:12px}
.art-tbl th{text-align:left;padding:8px 12px;font-size:9px;font-family:'Space Mono',monospace;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;border-bottom:2px solid var(--border);background:var(--surface2);white-space:nowrap}
.art-tbl td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
.art-tbl tr:last-child td{border-bottom:none}
.art-tbl tr:hover td{background:var(--surface2)}
.art-title{font-size:13px;font-weight:600;color:var(--green);text-decoration:none;font-family:'Noto Sans TC',sans-serif}
.art-title:hover{text-decoration:underline}
.domain-tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:9px;font-weight:700;font-family:'Space Mono',monospace;letter-spacing:.04em;border:1px solid}
.num-cell{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;color:var(--text)}
.num-cell.highlight{color:var(--rust)}
/* Mock banner */
.mock-banner{background:#fffbe6;border:1px solid #d4a72c;border-radius:8px;padding:10px 16px;margin-bottom:1.25rem;display:flex;align-items:center;justify-content:space-between;font-size:11px;font-family:'Space Mono',monospace;color:#b8860b}
.mock-banner span{font-weight:700}
/* Empty state */
.empty-state{text-align:center;padding:3rem 1rem;color:var(--text-muted)}
.empty-icon{font-size:3rem;margin-bottom:1rem;opacity:.5}
.empty-title{font-size:14px;font-weight:600;color:var(--text-sub);margin-bottom:.5rem}
.empty-desc{font-size:12px;font-family:'Space Mono',monospace;line-height:1.6}
.footer{background:var(--green);text-align:center;padding:1.25rem;font-size:11px;font-family:'Space Mono',monospace;color:var(--gray-pink);margin-top:2rem}
</style>
</head>
<body>
<header class="hdr">
  <div class="brand">
    <span class="brand-name">ORINGO</span>
    <div class="brand-sep"></div>
    <span class="brand-sub">SEO 監控</span>
  </div>
  <div class="hdr-r">
    <div class="live-dot"></div>
    <div class="hclock" id="clock">--:--:--</div>
    <div class="data-tag" id="data-tag">LOADING...</div>
    <a href="index.html" class="back-btn">← 返回儀表板</a>
  </div>
</header>

<div class="container">
  <div id="mock-banner-kw" class="mock-banner" style="display:none">
    <span>⚠ 關鍵字排名：目前顯示範例資料</span>
    <span>GAS 腳本設定完成後將自動切換為真實數據</span>
  </div>
  <div id="mock-banner-art" class="mock-banner" style="display:none">

  <!-- Tab switcher -->
  <div class="tab-nav">

  <!-- Tab 1: Keywords -->
  <div class="tab-panel active" id="panel-keywords">
    <div class="sec-hdr">
      <div class="sec-title">關鍵字排名追蹤</div>
      <div id="kw-date" style="font-size:11px;color:var(--text-muted);font-family:'Space Mono',monospace"></div>
    </div>

    <div class="store-pills" id="store-pills">
      <button class="sp active" onclick="filterStore('全部',this)">全部</button>
      <button class="sp" onclick="filterStore('松菸',this)">🌿 松菸</button>
      <button class="sp" onclick="filterStore('東門',this)">🚪 東門</button>
      <button class="sp" onclick="filterStore('中山',this)">🏙️ 中山</button>
      <button class="sp" onclick="filterStore('台中',this)">🏔️ 台中</button>
      <button class="sp" onclick="filterStore('品牌詞',this)">🏷️ 品牌詞</button>
    </div>

    <!-- Competitor alert -->
    <div id="ad-alert" style="display:none"></div>

    <!-- Keyword table -->
    <div class="card" style="padding:0;overflow:hidden">
      <div style="overflow-x:auto">
        <table class="ctbl" id="kw-table">
          <thead><tr>
            <th>關鍵字</th>
            <th>門市分類</th>
            <th>搜尋量/月</th>
            <th style="text-align:center">目前排名</th>
            <th style="text-align:center">上週排名</th>
            <th style="text-align:center">排名變化</th>
            <th>競品廣告</th>
            <th>競品名稱</th>
          </tr></thead>
          <tbody id="kw-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Tab 2: Articles -->
  <div class="tab-panel" id="panel-articles">
    <div class="sec-hdr">
      <div class="sec-title">外部文章導流</div>
      <div style="font-size:11px;color:var(--text-muted);font-family:'Space Mono',monospace">依週 Sessions 排序</div>
    </div>
    <div class="card" style="padding:0;overflow:hidden">
      <div style="overflow-x:auto">
        <table class="art-tbl" id="art-table">
          <thead><tr>
            <th>文章標題</th>
            <th>來源網域</th>
            <th style="text-align:right">週 Sessions</th>
            <th style="text-align:right">月 Sessions</th>
            <th style="text-align:right">週轉換</th>
            <th style="text-align:right">月轉換</th>
          </tr></thead>
          <tbody id="art-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<footer class="footer">
  林果良品 ORINGO｜SEO 監控｜每週一自動更新
  <span style="opacity:.4;font-size:10px;display:block;margin-top:3px">INTERNAL USE ONLY · ©2026 ORINGO</span>
</footer>

<script>
const SHEET_ID = '17hTgCpF0mBTHf3RcnDmRFrJMeLBn3nRdTMuG8l58QjY';

/* Mock data */
const MOCK_KEYWORDS = [
  // [更新時間, 門市, 關鍵字, 搜尋量, 目前排名, 上週排名, 排名變化, 有無競品廣告, 競品名稱]
  ['2026/04/21','松菸','台北皮鞋',2400,4,5,1,'N',''],
  ['2026/04/21','松菸','台北皮鞋推薦',1800,7,9,2,'Y','西班牙皮革坊'],
  ['2026/04/21','松菸','台北手工皮鞋',880,3,3,0,'N',''],
  ['2026/04/21','東門','台北皮鞋',2400,4,5,1,'N',''],
  ['2026/04/21','東門','台北皮鞋推薦',1800,7,9,2,'Y','西班牙皮革坊'],
  ['2026/04/21','東門','台北手工皮鞋',880,3,3,0,'N',''],
  ['2026/04/21','中山','台北皮鞋',2400,4,5,1,'N',''],
  ['2026/04/21','中山','台北皮鞋推薦',1800,7,9,2,'Y','西班牙皮革坊'],
  ['2026/04/21','中山','台北手工皮鞋',880,3,3,0,'Y','ManStyle皮鞋'],
  ['2026/04/21','台中','台中皮鞋',1600,2,3,1,'N',''],
  ['2026/04/21','台中','台中皮鞋推薦',1200,5,6,1,'Y','DAPPER臺灣'],
  ['2026/04/21','台中','台中手工皮鞋',540,1,1,0,'N',''],
  ['2026/04/21','品牌詞','林果良品',3200,1,1,0,'N',''],
  ['2026/04/21','品牌詞','oringo',2100,1,1,0,'N',''],
  ['2026/04/21','品牌詞','台灣皮鞋品牌',1400,3,4,1,'Y','G.T. Company'],
];

const MOCK_ARTICLES = [
  // [更新時間, 文章標題, 來源網域, 週Sessions, 週轉換, 月Sessions, 月轉換, 文章URL]
  ['2026/04/21','2026 台北必逛！5雙手工皮鞋品牌推薦','manstyle.com',342,12,1280,44,'https://manstyle.com/'],
  ['2026/04/21','林果良品評測：台灣皮鞋工藝深度報告','gq.com.tw',280,9,1050,35,'https://gq.com.tw/'],
  ['2026/04/21','職場穿搭指南：皮鞋品牌完整評比','cheers.com.tw',198,7,780,28,'https://cheers.com.tw/'],
  ['2026/04/21','精品皮鞋入門：從林果良品開始','esquire.com.tw',165,5,620,22,'https://esquire.com.tw/'],
  ['2026/04/21','台灣在地手工鞋品牌 TOP 10','storm.mg',122,3,480,14,'https://storm.mg/'],
  ['2026/04/21','紳士鞋選購完全指南 2026','cw.com.tw',98,4,390,17,'https://cw.com.tw/'],
  ['2026/04/21','台中購物：皮鞋職人工坊特集','taichung-life.tw',74,2,295,8,'https://taichung-life.tw/'],
];

const DOMAIN_COLORS = {
  'manstyle.com': { bg:'#1a3a5c', text:'#fff' },
  'gq.com.tw': { bg:'#222', text:'#fff' },
  'cheers.com.tw': { bg:'#005baf', text:'#fff' },
  'esquire.com.tw': { bg:'#c80000', text:'#fff' },
  'storm.mg': { bg:'#444', text:'#fff' },
  'cw.com.tw': { bg:'#005baf', text:'#fff' },
  'taichung-life.tw': { bg:'#284234', text:'#fff' },
};

let kwData = [];
let artData = [];
let currentFilter = '全部';

let _seq = 0;
function loadGviz(sheetName) {
  return new Promise((resolve, reject) => {
    const cb = '_seoCb' + (++_seq);
    window[cb] = function(resp) {
      delete window[cb];
      const rows = (resp.table.rows || []).map(r =>
        (r.c || []).map(cell => cell ? cell.v : null)
      );
      resolve(rows);
    };
    const s = document.createElement('script');
    s.onerror = () => { delete window[cb]; reject(new Error('Load failed: ' + sheetName)); };
    s.src = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=responseHandler:${cb}&sheet=${encodeURIComponent(sheetName)}`;
    document.head.appendChild(s);
  });
}

async function loadData() {
  // Load keywords
  let kwMock = false, artMock = false;
  try {
    const rows = await loadGviz('SEO關鍵字');
    const filtered = rows.filter(r => r[2]);
    if (filtered.length === 0) kwMock = true;
    else kwData = filtered;
  } catch(e) { kwMock = true; }

  if (kwMock) {
    document.getElementById('mock-banner-kw').style.display = 'flex';
    kwData = MOCK_KEYWORDS;
  }

  // Load articles
  try {
    const rows = await loadGviz('文章導流');
    const filtered = rows.filter(r => r[1]);
    if (filtered.length === 0) artMock = true;
    else artData = filtered;
  } catch(e) { artMock = true; }

  if (artMock) {
    document.getElementById('mock-banner-art').style.display = 'flex';
    artData = MOCK_ARTICLES;
  }

  document.getElementById('data-tag').textContent = (!kwMock && !artMock) ? 'LIVE DATA' : '部分範例';
  const date = kwData[0] ? kwData[0][0] || '' : '';
  document.getElementById('kw-date').textContent = date ? '更新：' + date : '';

  renderKeywords();
  renderArticles();
}

function rankClass(r) {
  if (!r || r <= 0) return 'rank-bad';
  if (r <= 3) return 'rank-good';
  if (r <= 10) return 'rank-ok';
  return 'rank-bad';
}

function renderKeywords() {
  const filtered = currentFilter === '全部'
    ? kwData
    : kwData.filter(r => String(r[1]).includes(currentFilter));

  // Build competitor alerts
  const ads = filtered.filter(r => r[7] === 'Y' && r[8]);
  const adAlert = document.getElementById('ad-alert');
  if (ads.length > 0) {
    const alertMap = {};
    ads.forEach(r => {
      const brand = r[8];
      if (!alertMap[brand]) alertMap[brand] = [];
      alertMap[brand].push(r[2]);
    });
    adAlert.style.display = 'block';
    adAlert.innerHTML = `<div class="alert-card">
      <div class="alert-hdr">⚠️ 競品廣告警示：${ads.length} 個關鍵字偵測到競品投放</div>
      ${Object.entries(alertMap).map(([brand, kws]) =>
        kws.map(kw => `<div class="alert-row">
          <span class="alert-kw">${kw}</span>
          <span style="color:var(--text-muted);font-size:11px">→</span>
          <span class="alert-brand">競品：${brand}</span>
        </div>`).join('')
      ).join('')}
    </div>`;
  } else {
    adAlert.style.display = 'none';
  }

  const tbody = document.getElementById('kw-tbody');
  if (filtered.length === 0) {
    tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;padding:2rem;color:var(--text-muted);font-family:'Space Mono',monospace">此分類尚無資料</td></tr>`;
    return;
  }

  tbody.innerHTML = filtered.map(r => {
    const [, store, kw, vol, curRank, prevRank, delta, hasAd, adBrand] = r;
    const rank = Number(curRank) || 0;
    const prev = Number(prevRank) || 0;
    const chg = Number(delta) || 0;
    const ad = hasAd === 'Y';

    const deltaHtml = chg > 0
      ? `<span class="rank-delta delta-up">↑ +${chg}</span>`
      : chg < 0
        ? `<span class="rank-delta delta-down">↓ ${chg}</span>`
        : `<span class="rank-delta delta-same">— 持平</span>`;

    return `<tr class="${ad ? 'has-ad' : ''}">
      <td class="kw-name">${kw || ''}</td>
      <td><span style="font-size:11px;color:var(--text-muted);font-family:'Space Mono',monospace">${store || ''}</span></td>
      <td><span class="vol-badge">${vol ? Number(vol).toLocaleString() : '—'}</span></td>
      <td style="text-align:center"><span class="rank-num ${rankClass(rank)}">${rank > 0 ? rank : '—'}</span></td>
      <td style="text-align:center;color:var(--text-muted);font-family:'Space Mono',monospace">${prev > 0 ? prev : '—'}</td>
      <td style="text-align:center">${deltaHtml}</td>
      <td><span class="ad-tag ${ad ? 'yes' : 'no'}">${ad ? '⚠ 有' : '✓ 無'}</span></td>
      <td style="font-size:11px;color:var(--negative);font-family:'Space Mono',monospace">${adBrand || (ad ? '未知' : '')}</td>
    </tr>`;
  }).join('');
}

function filterStore(store, btn) {
  currentFilter = store;
  document.querySelectorAll('.sp').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderKeywords();
}

function renderArticles() {
  const sorted = [...artData].sort((a, b) => (Number(b[3]) || 0) - (Number(a[3]) || 0));
  const tbody = document.getElementById('art-tbody');

  if (sorted.length === 0) {
    tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;padding:2rem;color:var(--text-muted);font-family:'Space Mono',monospace">尚無文章導流資料</td></tr>`;
    return;
  }

  tbody.innerHTML = sorted.map((r, i) => {
    const [, title, domain, weekSess, weekConv, monthSess, monthConv, url] = r;
    const dc = DOMAIN_COLORS[domain] || { bg: '#8D5531', text: '#fff' };
    return `<tr>
      <td><a href="${url || '#'}" target="_blank" class="art-title">${title || ''}</a></td>
      <td><span class="domain-tag" style="background:${dc.bg};color:${dc.text};border-color:${dc.bg}">${domain || ''}</span></td>
      <td style="text-align:right"><span class="num-cell highlight">${Number(weekSess || 0).toLocaleString()}</span></td>
      <td style="text-align:right"><span class="num-cell">${Number(monthSess || 0).toLocaleString()}</span></td>
      <td style="text-align:right"><span class="num-cell">${weekConv || 0}</span></td>
      <td style="text-align:right"><span class="num-cell">${monthConv || 0}</span></td>
    </tr>`;
  }).join('');
}

function switchTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
}

(function tick(){
  const n = new Date();
  document.getElementById('clock').textContent = [n.getHours(), n.getMinutes(), n.getSeconds()].map(v => ('0'+v).slice(-2)).join(':');
  setTimeout(tick, 1000);
})();

loadData();
</script>
</body>
</html>

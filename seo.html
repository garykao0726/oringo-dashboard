<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>林果良品｜SEO 分析</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--green:#284234;--dark:#002721;--sand:#E2CEB9;--sand-light:#F5EDE3;--rust:#A54A1A;--gray-pink:#CFA294;--brown:#8D5531;--bg:#F5EDE3;--surface:#ffffff;--surface2:#FAF5EF;--border:rgba(40,66,52,0.10);--border2:rgba(40,66,52,0.22);--text:#284234;--text-sub:#8D5531;--text-muted:#b09a88;--positive:#1a7a4a;--negative:#c0392b}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;min-height:100vh}
.hdr{position:sticky;top:0;z-index:100;background:var(--green);height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 2rem}
.brand{display:flex;align-items:center;gap:14px}
.brand-name{font-family:'Space Mono',monospace;font-size:13px;letter-spacing:.1em;color:var(--sand)}
.brand-sep{width:1px;height:16px;background:rgba(226,206,185,.3)}
.brand-sub{font-size:10px;color:var(--gray-pink);font-family:'Space Mono',monospace}
.hdr-r{display:flex;align-items:center;gap:14px}
.back-btn{padding:5px 14px;border-radius:20px;border:1px solid rgba(226,206,185,.3);font-size:11px;font-family:'Space Mono',monospace;color:var(--gray-pink);cursor:pointer;text-decoration:none;transition:all .2s}
.back-btn:hover{border-color:var(--sand);color:var(--sand)}
.hclock{font-family:'Space Mono',monospace;font-size:12px;color:var(--gray-pink)}
.container{max-width:1400px;margin:0 auto;padding:1.75rem 2rem}
.g2{display:grid;grid-template-columns:3fr 2fr;gap:1.25rem;margin-bottom:1.25rem}
@media(max-width:1000px){.g2{grid-template-columns:1fr}}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.sec-title{font-size:13px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px}
.sec-title::before{content:'';display:block;width:3px;height:14px;background:var(--rust);border-radius:2px}
.sec-date{font-size:11px;color:var(--text-muted);font-family:'Space Mono',monospace}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.35rem}
.card-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.1rem}
.card-lbl{font-size:12px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:7px}
.card-lbl::before{content:'';display:block;width:3px;height:12px;background:var(--rust);border-radius:2px}
.card-badge{font-size:9px;font-family:'Space Mono',monospace;color:var(--text-muted);background:var(--surface2);border:1px solid var(--border);padding:2px 8px;border-radius:4px}
.footer{background:var(--green);text-align:center;padding:1.25rem;font-size:11px;font-family:'Space Mono',monospace;color:var(--gray-pink);margin-top:2rem}
</style>
</head>
<body>
<header class="hdr">
  <div class="brand">
    <span class="brand-name">ORINGO</span>
    <div class="brand-sep"></div>
    <span class="brand-sub">SEO ANALYSIS</span>
  </div>
  <div class="hdr-r">
    <div class="hclock" id="clock">--:--:--</div>
    <a class="back-btn" href="index.html">← 返回營運儀表板</a>
  </div>
</header>

<div class="container">
  <div class="sec-hdr">
    <div class="sec-title">AI SEO 可見度分析</div>
    <div class="sec-date" id="seo-period">—</div>
  </div>

  <div id="seo-pending" style="display:none;background:#fdf6e0;border:1px solid #e8c84a;border-radius:8px;padding:1rem 1.25rem;margin-bottom:1.25rem;font-size:.84rem;color:#8a6200">
    ⏳ 等待 SEO GAS 首次執行後自動顯示資料。API credits 充值後跑一次 <code>runWeeklyReport()</code> 即可。
  </div>

  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1rem;margin-bottom:1.25rem" id="seo-scores"></div>

  <div class="g2">
    <div class="card">
      <div class="card-hdr"><span class="card-lbl">本週急需處理</span><span class="card-badge">依難度排序</span></div>
      <div id="seo-actions"></div>
    </div>
    <div class="card">
      <div class="card-hdr"><span class="card-lbl">競品 AI 可見度比較</span><span class="card-badge">最新分析</span></div>
      <div id="seo-competitors" style="padding:.5rem 0"></div>
    </div>
  </div>
</div>

<footer class="footer">
  林果良品 ORINGO｜SEO 分析｜每週自動更新
  <span style="opacity:.4;font-size:10px;display:block;margin-top:3px">INTERNAL USE ONLY · ©2026 ORINGO</span>
</footer>

<script>
const SHEET_ID='17hTgCpF0mBTHf3RcnDmRFrJMeLBn3nRdTMuG8l58QjY';
let _gvizSeq=0;
function loadGviz(sheetName){
  return new Promise((resolve,reject)=>{
    const cb='_gvizCb'+(++_gvizSeq);
    window[cb]=function(resp){
      delete window[cb];
      const rows=(resp.table.rows||[]).map(r=>(r.c||[]).map(cell=>cell?cell.v:null));
      resolve(rows);
    };
    const s=document.createElement('script');
    s.onerror=()=>reject(new Error('Load failed: '+sheetName));
    s.src=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=responseHandler:${cb}&sheet=${encodeURIComponent(sheetName)}`;
    document.head.appendChild(s);
  });
}

function seoClr(s){return s>=80?'#2d7a45':s>=60?'#b87a00':'#b03020';}
function seoBg(s){return s>=80?'#e6f4eb':s>=60?'#fdf6e0':'#fcecea';}

async function loadSeoData(){
  try{
    const rows=await loadGviz('SEO數據');
    if(!rows||rows.length<1){showSeoPending();return;}
    const pageMap={};
    rows.forEach(r=>{
      const label=String(r[3]||'').trim();
      const date=String(r[1]||'').trim();
      if(!label||!date)return;
      if(!pageMap[label]||date>pageMap[label].date){
        const f=i=>({title:String(r[6+i*4]||''),problem:String(r[7+i*4]||''),steps:String(r[8+i*4]||''),effort:String(r[9+i*4]||'')});
        pageMap[label]={label,date,type:String(r[2]||''),score:Number(r[4])||0,summary:String(r[5]||''),fixes:[0,1,2].map(f).filter(x=>x.title)};
      }
    });
    const histMap={};
    rows.forEach(r=>{const l=String(r[3]||'').trim(),d=String(r[1]||'').trim(),s=Number(r[4])||0;if(!l||!d)return;if(!histMap[l])histMap[l]=[];histMap[l].push({d,s});});
    Object.keys(histMap).forEach(l=>{
      histMap[l].sort((a,b)=>a.d>b.d?1:-1);
      const arr=histMap[l];
      if(arr.length>=2&&pageMap[l])pageMap[l].trend=arr[arr.length-1].s-arr[arr.length-2].s;
    });
    const all=Object.values(pageMap);
    const own=all.filter(p=>p.type==='自家');
    const comp=all.filter(p=>p.type==='競品');
    if(!own.length){showSeoPending();return;}
    const latest=all.reduce((a,b)=>a.date>b.date?a:b,all[0]);
    document.getElementById('seo-period').textContent='更新 '+latest.date;
    renderSeoScores(own);
    renderSeoActions(own);
    renderSeoCompetitors(own,comp);
  }catch(e){
    console.error('loadSeoData',e);
    showSeoPending();
  }
}

function showSeoPending(){
  document.getElementById('seo-pending').style.display='block';
  document.getElementById('seo-scores').innerHTML='';
  document.getElementById('seo-actions').innerHTML='<div style="padding:1rem;color:var(--text-muted);font-size:.84rem">等待資料</div>';
  document.getElementById('seo-competitors').innerHTML='<div style="padding:1rem;color:var(--text-muted);font-size:.84rem">等待資料</div>';
}

function renderSeoScores(own){
  document.getElementById('seo-scores').innerHTML=own.map(p=>{
    const clr=seoClr(p.score),bg=seoBg(p.score);
    const trendHtml=p.trend!=null?(p.trend>0?`<span style="color:#2d7a45">↑+${p.trend}</span>`:p.trend<0?`<span style="color:#b03020">↓${p.trend}</span>`:`<span style="color:#888">持平</span>`):`<span style="color:#888">首次</span>`;
    const topFix=p.fixes[0]?p.fixes[0].title:'—';
    return`<div class="card" style="padding:1rem">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.4rem">
        <span style="font-size:.82rem;font-weight:700;color:var(--text)">${p.label}</span>
        <span style="font-size:.72rem">${trendHtml}</span>
      </div>
      <div style="font-size:2rem;font-weight:700;color:${clr};font-family:'Space Mono',monospace;line-height:1">${p.score}</div>
      <div style="font-size:.7rem;color:var(--text-muted);margin:.2rem 0 .4rem">/100 AI 可見度</div>
      <div style="font-size:.76rem;color:var(--text);border-top:1px solid var(--border);padding-top:.4rem;margin-bottom:.3rem">${p.summary}</div>
      <div style="font-size:.74rem;color:var(--rust);font-weight:600">⚡ ${topFix}</div>
    </div>`;
  }).join('');
}

function renderSeoActions(own){
  const el=document.getElementById('seo-actions');
  const all=[];own.forEach(p=>(p.fixes||[]).forEach(f=>all.push({...f,pageLabel:p.label,pageScore:p.score})));
  const ord={'低':0,'中':1,'高':2};
  all.sort((a,b)=>(ord[a.effort]||3)-(ord[b.effort]||3)||a.pageScore-b.pageScore);
  if(!all.length){el.innerHTML='<div style="padding:1rem;color:var(--text-muted);font-size:.84rem">暫無資料</div>';return;}
  const rows=all.map((f,i)=>{
    const ec=f.effort==='低'?'#2d7a45':f.effort==='中'?'#b87a00':'#b03020';
    const eb=f.effort==='低'?'#e6f4eb':f.effort==='中'?'#fdf6e0':'#fcecea';
    return`<tr style="border-top:1px solid var(--border)">
      <td style="padding:7px 8px;font-size:.78rem;color:var(--text-muted)">${i+1}</td>
      <td style="padding:7px 8px"><span style="background:${eb};color:${ec};border-radius:4px;padding:2px 7px;font-size:.75rem;font-weight:600">${f.effort||'—'}</span></td>
      <td style="padding:7px 8px;font-size:.78rem;color:var(--green);font-weight:600">${f.pageLabel}</td>
      <td style="padding:7px 8px;font-size:.78rem;font-weight:600;color:var(--text)">${f.title}</td>
      <td style="padding:7px 8px;font-size:.75rem;color:var(--text-muted)">${f.problem}</td>
    </tr>`;
  }).join('');
  el.innerHTML=`<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse">
    <thead><tr>
      <th style="padding:7px 8px;font-size:.74rem;color:var(--text-muted);text-align:left">#</th>
      <th style="padding:7px 8px;font-size:.74rem;color:var(--text-muted);text-align:left">難度</th>
      <th style="padding:7px 8px;font-size:.74rem;color:var(--text-muted);text-align:left">頁面</th>
      <th style="padding:7px 8px;font-size:.74rem;color:var(--text-muted);text-align:left">問題</th>
      <th style="padding:7px 8px;font-size:.74rem;color:var(--text-muted);text-align:left">說明</th>
    </tr></thead>
    <tbody>${rows}</tbody></table></div>`;
}

function renderSeoCompetitors(own,comp){
  const el=document.getElementById('seo-competitors');
  const ownAvg=own.length?Math.round(own.reduce((s,p)=>s+p.score,0)/own.length):0;
  const all=[{label:'ORINGO（自家）',score:ownAvg,isOwn:true}].concat(comp.map(c=>({label:c.label,score:c.score,isOwn:false})));
  all.sort((a,b)=>b.score-a.score);
  const max=all[0]?.score||100;
  el.innerHTML=all.map(b=>{
    const clr=seoClr(b.score);
    const pct=Math.round(b.score/max*100);
    return`<div style="margin-bottom:.85rem;padding:0 .25rem">
      <div style="display:flex;justify-content:space-between;margin-bottom:3px">
        <span style="font-size:.82rem;font-weight:${b.isOwn?700:500};color:${b.isOwn?'var(--green)':'var(--text)'}">${b.label}</span>
        <span style="font-size:.82rem;font-weight:700;color:${clr};font-family:'Space Mono',monospace">${b.score}</span>
      </div>
      <div style="background:var(--sand);border-radius:4px;height:7px">
        <div style="background:${clr};width:${pct}%;height:7px;border-radius:4px"></div>
      </div></div>`;
  }).join('');
}

(function tick(){const n=new Date();document.getElementById('clock').textContent=[n.getHours(),n.getMinutes(),n.getSeconds()].map(v=>('0'+v).slice(-2)).join(':');setTimeout(tick,1000);})();
loadSeoData();
</script>
</body>
</html>

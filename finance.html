<style>
:root{--green:#284234;--dark:#002721;--sand:#E2CEB9;--sand-light:#F5EDE3;--rust:#A54A1A;--gray-pink:#CFA294;--brown:#8D5531;--bg:#F5EDE3;--surface:#fff;--surface2:#FAF5EF;--border:rgba(40,66,52,.10);--border2:rgba(40,66,52,.22);--text:#284234;--text-sub:#8D5531;--text-muted:#b09a88;--pos:#1a7a4a;--neg:#c0392b;--warn:#b07d12}

.back-link{font-family:'Space Mono',monospace;font-size:11px;color:var(--gray-pink);text-decoration:none;border:1px solid rgba(226,206,185,.25);padding:3px 10px;border-radius:20px;transition:all .15s}
.back-link:hover{color:var(--sand);border-color:var(--sand)}
.lock-badge{font-size:10px;font-family:'Space Mono',monospace;color:#e8a87c;letter-spacing:.05em;padding:3px 10px;border:1px solid rgba(232,168,124,.3);border-radius:20px}
.user-chip{display:flex;align-items:center;gap:8px;padding:4px 12px 4px 6px;border-radius:20px;border:1px solid rgba(226,206,185,.25);cursor:pointer;transition:all .15s}

.user-name{font-family:'Space Mono',monospace;font-size:10px;color:var(--gray-pink)}

.signin-btn:hover{border-color:var(--green);box-shadow:0 2px 8px rgba(40,66,52,.12)}
.signin-btn svg{width:20px;height:20px;flex-shrink:0}

.denied-box strong{color:var(--neg);display:block;margin-bottom:6px}
.denied-box span{font-size:12px;color:var(--text-muted)}

/* ── Main content ── */

<script>
/* ════════════════════════════════════════════════════════
   AUTH
   ════════════════════════════════════════════════════════ */
let accessToken = null;
let currentUser = null;
let tokenClient;

window.addEventListener('load', () => {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: GOOGLE_CLIENT_ID,
    scope: 'openid email profile https://www.googleapis.com/auth/spreadsheets.readonly',
    callback: handleTokenResponse,
  });
  document.getElementById('signin-btn').addEventListener('click', () => {
    document.getElementById('signin-btn').style.display = 'none';
    document.getElementById('loading-auth').style.display = 'block';
    tokenClient.requestAccessToken({ prompt: 'select_account' });
  });
});

async function handleTokenResponse(response) {
  document.getElementById('loading-auth').style.display = 'none';
  if (response.error) {
    document.getElementById('signin-btn').style.display = 'flex';
    return;
  }
  accessToken = response.access_token;

  /* verify identity */
  const info = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
    headers: { Authorization: 'Bearer ' + accessToken }
  }).then(r => r.json());

  currentUser = info;
  if (ALLOWED_EMAILS.map(e => e.toLowerCase()).includes((info.email || '').toLowerCase())) {
    grantAccess(info);
    loadAndRender();
  } else {
    document.getElementById('denied-email').textContent = info.email;
    document.getElementById('denied-msg').style.display = 'block';
    document.getElementById('signin-btn').style.display = 'flex';
  }
}

function grantAccess(user) {
  document.getElementById('auth-gate').style.display = 'none';
  document.getElementById('main-content').style.display = 'block';
  document.getElementById('user-chip').style.display = 'flex';
  document.getElementById('user-avatar').src = user.picture || '';
  document.getElementById('user-name').textContent = user.name || user.email;
  document.getElementById('logged-email').textContent = user.email;
}

function signOut() {
  google.accounts.oauth2.revoke(accessToken, () => {});
  accessToken = null; currentUser = null;
  document.getElementById('auth-gate').style.display = 'flex';
  document.getElementById('main-content').style.display = 'none';
  document.getElementById('user-chip').style.display = 'none';
  document.getElementById('signin-btn').style.display = 'flex';
  document.getElementById('denied-msg').style.display = 'none';
}

/* ════════════════════════════════════════════════════════
   DATA LOADING  (Sheets API v4 — sheet stays private)
   ════════════════════════════════════════════════════════ */
async function loadAndRender() {
  try {
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${MASTER_SHEET_ID}/values/${encodeURIComponent(DATA_TAB)}`;
    const res = await fetch(url, { headers: { Authorization: 'Bearer ' + accessToken } });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const json = await res.json();
    const raw = json.values || [];
    processAndRender(raw);
  } catch(e) {
    document.getElementById('loading-data').innerHTML =
      '<span style="color:var(--neg)">⚠ 資料讀取失敗：' + e.message + '。請確認 Google Sheets 已共用給此帳號。</span>';
  }
}

/* ════════════════════════════════════════════════════════
   DATA PROCESSING
   ════════════════════════════════════════════════════════ */
function n(v) { return parseFloat(String(v).replace(/,/g,'')) || 0; }
function pct(a,b) { return b !== 0 ? a/b*100 : 0; }
function fmt(v) { return '$ ' + Math.round(v).toLocaleString('zh-TW'); }
function fmtW(v) { return (Math.round(v/1000)/10).toFixed(1) + '萬'; }
function fmtPct(v) { return n(v).toFixed(1) + '%'; }
function chg(v) { return (v >= 0 ? '▲ ' : '▼ ') + Math.abs(v).toFixed(1) + '%'; }

/* Color helpers matching GAS thresholds */
function achColor(v) { return v >= 100 ? 'pos' : v >= 85 ? 'warn' : 'neg'; }
function npColor(v)  { return v >= 8 ? 'pos' : v >= 5 ? 'warn' : 'neg'; }
function salColor(v) { return v >= 18 ? 'neg' : v >= 15 ? 'warn' : 'pos'; }
function mktColor(v) { return v >= 8 ? 'neg' : v >= 6 ? 'warn' : 'pos'; }
function cSSColor(cls) {
  return cls === 'pos' ? 'var(--pos)' : cls === 'neg' ? 'var(--neg)' : 'var(--warn)';
}
function tagClass(cls) {
  return cls === 'pos' ? 'tag-ok' : cls === 'neg' ? 'tag-bad' : 'tag-warn';
}

function processAndRender(raw) {
  /* Skip header row (index 0) */
  const rows = raw.slice(1).map(r => ({
    ym:    String(r[0]  || '').trim(),  /* e.g. "2025/01" */
    store: String(r[1]  || '').trim(),
    rev:   n(r[2]),  cogs: n(r[3]),  gp:  n(r[4]),   gpPct:  n(r[5]),
    wage:  n(r[6]),  wagePct: n(r[7]), rent: n(r[8]),
    mkt:   n(r[9]),  mktPct: n(r[10]),
    op:    n(r[11]), opPct:  n(r[12]),
    ni:    n(r[13]), niPct:  n(r[14]),
    tgt:   n(r[15]), achPct: n(r[16]),
    yoyRev: r[17] !== undefined ? n(r[17]) : null,
    yoyNi:  r[18] !== undefined ? n(r[18]) : null,
    momRev: r[19] !== undefined ? n(r[19]) : null,
    momNi:  r[20] !== undefined ? n(r[20]) : null,
  })).filter(r => r.ym && r.store);

  const allYM = [...new Set(rows.map(r => r.ym))].sort();
  const latestYM = allYM[allYM.length - 1];
  const latestMonth = parseInt(latestYM.split('/')[1]) - 1;  /* 0-indexed */
  const latestYear  = latestYM.split('/')[0];

  const curRows = rows.filter(r => r.ym === latestYM);
  const ytdRows = rows.filter(r => r.ym.startsWith(latestYear));

  /* Update status */
  document.getElementById('data-status').textContent = '資料截至 ' + latestYM;
  document.getElementById('loading-data').style.display = 'none';
  document.getElementById('finance-body').style.display = 'block';

  /* ── KPIs ── */
  const totalRev    = curRows.reduce((s,r) => s + r.rev, 0);
  const totalNI     = curRows.reduce((s,r) => s + r.ni, 0);
  const totalWage   = curRows.reduce((s,r) => s + r.wage, 0);
  const totalCogs   = curRows.reduce((s,r) => s + r.cogs, 0);
  const totalMkt    = curRows.reduce((s,r) => s + r.mkt, 0);
  const totalTarget = STORES.reduce((s,st) => s + MONTHLY_TARGETS[st][latestMonth]*10000, 0);
  const totalAch    = pct(totalRev, totalTarget);
  const totalNP     = pct(totalNI, totalRev);

  const ytdRev = ytdRows.reduce((s,r) => s + r.rev, 0);
  const ytdNI  = ytdRows.reduce((s,r) => s + r.ni, 0);

  const kpis = [
    { label:'五通路當月營收', val:fmtW(totalRev), sub:'目標 '+fmtW(totalTarget), delta:chg(totalAch-100)+' vs 目標', dCls:achColor(totalAch) },
    { label:'五通路達成率',   val:fmtPct(totalAch), sub:'目標 100%', delta:'', dCls:achColor(totalAch) },
    { label:'全公司淨利率',   val:fmtPct(totalNP), sub:'目標 8%', delta:'', dCls:npColor(totalNP) },
    { label:'年初至今淨利',   val:fmt(ytdNI), sub:latestYear+' YTD', delta:'年度進度 '+fmtPct(pct(ytdNI,COMPANY_NI_TARGET)), dCls:npColor(pct(ytdNI,COMPANY_NI_TARGET)) },
  ];
  document.getElementById('kpi-grid').innerHTML = kpis.map(k => `
    <div class="kpi">
      <div class="kpi-label">${k.label}</div>
      <div class="kpi-val ${k.dCls}">${k.val}</div>
      <div class="kpi-sub">${k.sub}</div>
      ${k.delta ? `<div class="kpi-delta ${k.dCls}">${k.delta}</div>` : ''}
    </div>`).join('');

  /* ── Store cards ── */
  document.getElementById('store-grid').innerHTML = STORES.map(st => {
    const r = curRows.find(x => x.store === st);
    if (!r) return `<div class="store-card"><div class="store-name">${st}</div><div style="font-size:11px;color:var(--text-muted);margin-top:8px">無資料</div></div>`;

    const tgt = MONTHLY_TARGETS[st][latestMonth] * 10000;
    const ach = pct(r.rev, tgt);
    const barW = Math.min(ach, 100).toFixed(1);
    const ac = achColor(ach);
    const nc = npColor(r.niPct);
    const sc = salColor(r.wagePct);
    const mc = mktColor(r.mktPct);

    const stYtd    = ytdRows.filter(x => x.store === st);
    const stYtdRev = stYtd.reduce((s,x) => s+x.rev, 0);
    const stYtdNI  = stYtd.reduce((s,x) => s+x.ni,  0);
    const annRevAch = pct(stYtdRev, ANNUAL_REV_TARGETS[st]);
    const annNIAch  = pct(stYtdNI,  ANNUAL_NI_TARGETS[st]);

    const yoyStr = r.yoyRev !== null ? chg(r.yoyRev) : 'N/A';

    return `
    <div class="store-card">
      <div class="store-hd">
        <span class="store-name" style="color:${STORE_COLORS[st]}">${st}</span>
        <span class="store-ach ${ac}">${ach.toFixed(1)}%</span>
      </div>
      <div class="bar-track"><div class="bar-fill" style="width:${barW}%;background:${cSSColor(ac)}"></div></div>
      <div class="store-meta">${fmtW(r.rev)} / ${fmtW(tgt)}</div>
      <div class="store-rates">
        <div class="rate-row"><span class="rate-lbl">毛利率</span><span>${fmtPct(r.gpPct)}</span></div>
        <div class="rate-row"><span class="rate-lbl">淨利率</span><span class="${nc}">${fmtPct(r.niPct)}</span></div>
        <div class="rate-row"><span class="rate-lbl">薪資率</span><span class="${sc}">${fmtPct(r.wagePct)}</span></div>
        <div class="rate-row"><span class="rate-lbl">行銷率</span><span class="${mc}">${fmtPct(r.mktPct)}</span></div>
      </div>
      <div class="store-foot">
        <span>YOY ${yoyStr}</span>
        <span>年 ${annRevAch.toFixed(1)}%</span>
      </div>
    </div>`;
  }).join('');

  /* ── Trend charts ── */
  const trendYMs = allYM.slice(-14);
  const trendLabels = trendYMs.map(m => m.replace(/^\d{4}\//, '') + '月');

  /* Revenue trend */
  const revDatasets = STORES.map(st => ({
    label: st,
    data: trendYMs.map(ym => {
      const r = rows.find(x => x.ym === ym && x.store === st);
      return r ? Math.round(r.rev/1000)/10 : null;
    }),
    borderColor: STORE_COLORS[st],
    backgroundColor: 'transparent',
    borderWidth: 2, pointRadius: 3, tension: 0.3, spanGaps: false,
  }));

  const legend = (chartId, ids) => {
    document.getElementById(chartId).innerHTML = ids.map(st => `
      <div class="leg-item">
        <div class="leg-dot" style="background:${STORE_COLORS[st]}"></div>${st}
      </div>`).join('');
  };
  legend('rev-legend', STORES);
  legend('np-legend', STORES);

  new Chart(document.getElementById('rev-chart'), {
    type: 'line',
    data: { labels: trendLabels, datasets: revDatasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { display: false }, ticks: { color: '#b09a88', font: { size: 11 }, maxRotation: 0 } },
        y: { grid: { color: 'rgba(40,66,52,.06)' }, ticks: { color: '#b09a88', font: { size: 11 }, callback: v => v + '萬' } }
      }
    }
  });

  /* NP rate trend */
  const npDatasets = [
    ...STORES.map(st => ({
      label: st,
      data: trendYMs.map(ym => {
        const r = rows.find(x => x.ym === ym && x.store === st);
        return r && r.niPct !== 0 ? Math.round(r.niPct*10)/10 : null;
      }),
      borderColor: STORE_COLORS[st],
      backgroundColor: 'transparent',
      borderWidth: 1.5, pointRadius: 2, tension: 0.3, spanGaps: false,
    })),
    {
      label: '目標8%',
      data: trendYMs.map(() => 8),
      borderColor: 'rgba(192,57,43,.4)',
      borderDash: [5,4], borderWidth: 1.5, pointRadius: 0,
      backgroundColor: 'transparent',
    }
  ];

  new Chart(document.getElementById('np-chart'), {
    type: 'line',
    data: { labels: trendLabels, datasets: npDatasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { display: false }, ticks: { color: '#b09a88', font: { size: 11 }, maxRotation: 0 } },
        y: { grid: { color: 'rgba(40,66,52,.06)' }, ticks: { color: '#b09a88', font: { size: 11 }, callback: v => v + '%' }, min: -60, max: 40 }
      }
    }
  });

  /* ── Expense cards ── */
  const wageRate = pct(totalWage, totalRev);
  const cogsRate = pct(totalCogs, totalRev);
  const mktRate  = pct(totalMkt,  totalRev);
  const ytdMkt   = ytdRows.reduce((s,r) => s+r.mkt, 0);
  const sc2 = wageRate >= 30 ? 'neg' : wageRate >= 27 ? 'warn' : 'pos';
  const cc2 = cogsRate >= 34 ? 'neg' : cogsRate >= 31 ? 'warn' : 'pos';
  const mc2 = mktRate  >= 8  ? 'neg' : mktRate  >= 6  ? 'warn' : 'pos';

  document.getElementById('exp-grid').innerHTML = `
    <div class="exp-card">
      <div class="exp-label">人事率（薪資）</div>
      <div class="exp-val ${sc2}">${fmtPct(wageRate)}</div>
      <span class="tag ${tagClass(sc2)}">${wageRate>=30?'超標':wageRate>=27?'接近上限':'正常'} 上限30%</span>
      <div class="exp-sub" style="margin-top:8px">當月薪資合計 ${fmtW(totalWage)}</div>
    </div>
    <div class="exp-card">
      <div class="exp-label">成本率（進貨）</div>
      <div class="exp-val ${cc2}">${fmtPct(cogsRate)}</div>
      <span class="tag ${tagClass(cc2)}">${cogsRate>=34?'超標':cogsRate>=31?'偏高':'正常'} 上限34%</span>
      <div class="exp-sub" style="margin-top:8px">當月進貨合計 ${fmtW(totalCogs)}</div>
    </div>
    <div class="exp-card">
      <div class="exp-label">行銷率（6117）</div>
      <div class="exp-val ${mc2}">${fmtPct(mktRate)}</div>
      <span class="tag ${tagClass(mc2)}">${mktRate>=8?'超標':mktRate>=6?'接近上限':'正常'} 上限6%</span>
      <div class="exp-sub" style="margin-top:8px">YTD已用 ${fmtW(ytdMkt)} / 年度預算 ${fmtW(COMPANY_MKT_BUDGET)}</div>
    </div>`;

  /* ── Anomaly alerts ── */
  const anomalies = [];
  if (wageRate >= 30) anomalies.push({ cls:'red', msg:'全公司人事率 '+fmtPct(wageRate)+'，超標（上限30%）' });
  else if (wageRate >= 27) anomalies.push({ cls:'yellow', msg:'全公司人事率 '+fmtPct(wageRate)+'，接近上限30%' });
  if (cogsRate >= 34) anomalies.push({ cls:'red', msg:'全公司成本率 '+fmtPct(cogsRate)+'，超標（上限34%）' });
  else if (cogsRate >= 31) anomalies.push({ cls:'yellow', msg:'全公司成本率 '+fmtPct(cogsRate)+'，偏高' });
  if (totalNP < 5) anomalies.push({ cls:'red', msg:'全公司淨利率 '+fmtPct(totalNP)+'，嚴重不足（目標8%）' });
  else if (totalNP < 8) anomalies.push({ cls:'yellow', msg:'全公司淨利率 '+fmtPct(totalNP)+'，未達目標8%' });

  STORES.forEach(st => {
    const r = curRows.find(x => x.store === st);
    if (!r) return;
    const tgt = MONTHLY_TARGETS[st][latestMonth] * 10000;
    const ach = pct(r.rev, tgt);
    if (r.wagePct >= 18) anomalies.push({ cls:'red', msg:st+' 薪資率 '+fmtPct(r.wagePct)+'，嚴重超標（上限15%）' });
    else if (r.wagePct >= 15) anomalies.push({ cls:'yellow', msg:st+' 薪資率 '+fmtPct(r.wagePct)+'，超標' });
    if (r.mktPct >= 8) anomalies.push({ cls:'red', msg:st+' 行銷率 '+fmtPct(r.mktPct)+'，超標（上限6%）' });
    else if (r.mktPct >= 6) anomalies.push({ cls:'yellow', msg:st+' 行銷率 '+fmtPct(r.mktPct)+'，接近上限' });
    if (r.niPct < 5) anomalies.push({ cls:'red', msg:st+' 淨利率 '+fmtPct(r.niPct)+'，嚴重不足' });
    else if (r.niPct < 8) anomalies.push({ cls:'yellow', msg:st+' 淨利率 '+fmtPct(r.niPct)+'，未達目標8%' });
    if (ach < 70) anomalies.push({ cls:'red', msg:st+' 達成率 '+fmtPct(ach)+'，嚴重不足' });
    if (r.yoyRev !== null && r.yoyRev < -10) anomalies.push({ cls:'red', msg:st+' YOY營收衰退 '+chg(r.yoyRev) });
  });

  const anomalyEl = document.getElementById('anomaly-list');
  if (anomalies.length === 0) {
    anomalyEl.innerHTML = '<div class="anomaly-none">✅ 本月無重大異常</div>';
  } else {
    anomalyEl.innerHTML = anomalies.map(a =>
      `<div class="anomaly-item anomaly-${a.cls}">${a.cls==='red'?'🔴':'🟡'} ${a.msg}</div>`
    ).join('');
  }

  /* ── Summary table (last 18 months) ── */
  const recentYMs = allYM.slice(-18).reverse();
  const tbody = document.getElementById('summary-tbody');
  tbody.innerHTML = recentYMs.flatMap(ym =>
    STORES.map(st => {
      const r = rows.find(x => x.ym === ym && x.store === st);
      if (!r) return '';
      const nc = npColor(r.niPct), ac = achColor(r.achPct);
      const yoyStr = r.yoyRev !== null ? `<span class="${r.yoyRev>=0?'pos':'neg'}">${chg(r.yoyRev)}</span>` : '—';
      return `<tr>
        <td class="ym-cell">${r.ym}</td>
        <td class="store-cell" style="color:${STORE_COLORS[st]}">${st}</td>
        <td class="num">${fmtW(r.rev)}</td>
        <td class="num">${fmtPct(r.gpPct)}</td>
        <td class="num ${salColor(r.wagePct)}">${fmtPct(r.wagePct)}</td>
        <td class="num ${mktColor(r.mktPct)}">${fmtPct(r.mktPct)}</td>
        <td class="num ${nc}">${fmtW(r.ni)}</td>
        <td class="num ${nc}">${fmtPct(r.niPct)}</td>
        <td class="num ${ac}">${fmtPct(r.achPct)}</td>
        <td class="num">${yoyStr}</td>
      </tr>`;
    })
  ).join('');

  /* ── Report archive links ── */
  const reportYMs = allYM.slice().reverse();
  document.getElementById('report-grid').innerHTML = reportYMs.map((ym, i) => {
    const [y, m] = ym.split('/');
    return `<a class="report-link" href="/oringo-dashboard/report/${y+m}/" target="_blank">
      <span>${y}年${parseInt(m)}月${i===0?' <span class="latest-tag">最新</span>':''}</span>
      <span>→</span>
    </a>`;
  }).join('');
}
</script>
</body>
</html>

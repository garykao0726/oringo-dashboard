<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>林果良品｜GBP 門市流量</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{--green:#284234;--dark:#002721;--sand:#E2CEB9;--sand-light:#F5EDE3;--rust:#A54A1A;--gray-pink:#CFA294;--brown:#8D5531;--bg:#F5EDE3;--surface:#ffffff;--surface2:#FAF5EF;--border:rgba(40,66,52,0.10);--border2:rgba(40,66,52,0.22);--text:#284234;--text-sub:#8D5531;--text-muted:#b09a88;--positive:#1a7a4a;--negative:#c0392b}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;min-height:100vh}
.hdr{position:sticky;top:0;z-index:100;background:var(--green);height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 2rem}
.brand{display:flex;align-items:center;gap:14px}
.brand-name{font-family:'Space Mono',monospace;font-size:13px;letter-spacing:.1em;color:var(--sand)}
.brand-sep{width:1px;height:16px;background:rgba(226,206,185,.3)}
.brand-sub{font-size:10px;color:var(--gray-pink);font-family:'Space Mono',monospace}
.hdr-r{display:flex;align-items:center;gap:14px}
.back-btn{padding:5px 14px;font-size:11px;font-family:'Space Mono',monospace;color:var(--sand);background:rgba(226,206,185,.12);border:1px solid rgba(226,206,185,.25);border-radius:6px;cursor:pointer;text-decoration:none;transition:all .18s}
.back-btn:hover{background:rgba(226,206,185,.22)}
.data-tag{padding:3px 10px;border-radius:20px;border:1px solid rgba(226,206,185,.25);font-size:10px;font-family:'Space Mono',monospace;color:var(--gray-pink)}
.live-dot{width:7px;height:7px;border-radius:50%;background:#5be8a0;box-shadow:0 0 8px #5be8a0;animation:blink 2.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.hclock{font-family:'Space Mono',monospace;font-size:12px;color:var(--gray-pink)}
.container{max-width:1400px;margin:0 auto;padding:1.75rem 2rem}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.sec-title{font-size:13px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px}
.sec-title::before{content:'';display:block;width:3px;height:14px;background:var(--rust);border-radius:2px}
.sec-date{font-size:11px;color:var(--text-muted);font-family:'Space Mono',monospace}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.35rem;margin-bottom:1.25rem}
.card-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.1rem}
.card-lbl{font-size:12px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:7px}
.card-lbl::before{content:'';display:block;width:3px;height:12px;background:var(--rust);border-radius:2px}
.card-badge{font-size:9px;font-family:'Space Mono',monospace;color:var(--text-muted);background:var(--surface2);border:1px solid var(--border);padding:2px 8px;border-radius:4px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:1.25rem;margin-bottom:1.25rem}
.g2{display:grid;grid-template-columns:3fr 2fr;gap:1.25rem;margin-bottom:1.25rem}
@media(max-width:1100px){.g4{grid-template-columns:repeat(2,1fr)}}
@media(max-width:700px){.g4{grid-template-columns:1fr}.g2{grid-template-columns:1fr}}
.store-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.25rem;position:relative;overflow:hidden}
.store-card::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--sc-color,var(--green))}
.sc-name{font-size:14px;font-weight:700;color:var(--text);margin-bottom:1rem;display:flex;align-items:center;gap:8px}
.sc-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.sc-kpi{padding:8px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:7px}
.sc-kpi-l{font-size:9px;color:var(--text-muted);font-family:'Space Mono',monospace;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}
.sc-kpi-v{font-family:'Space Mono',monospace;font-size:18px;font-weight:700;color:var(--text);line-height:1}
.sc-kpi-main{grid-column:1/-1;border-color:var(--sc-color,var(--green));border-left-width:3px}
.sc-kpi-main .sc-kpi-v{font-size:24px;color:var(--rust)}
.sc-ratio-label{font-size:9px;color:var(--text-muted);font-family:'Space Mono',monospace;display:flex;justify-content:space-between;margin-bottom:4px}
.sc-ratio-bar{height:8px;border-radius:4px;overflow:hidden;display:flex}
.ratio-search{background:var(--green)}
.ratio-map{background:var(--sand)}
.prog{height:5px;background:var(--sand);border-radius:3px;overflow:hidden}
.prog-bar{height:100%;border-radius:3px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.ch260{position:relative;height:260px}
.ch200{position:relative;height:200px}
.legend{display:flex;gap:12px;flex-wrap:wrap;margin-top:8px}
.leg-i{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--text-muted);font-family:'Space Mono',monospace;cursor:pointer;padding:3px 6px;border-radius:4px;transition:background .15s}
.leg-i:hover{background:var(--surface2)}
.leg-i.hidden{opacity:.4}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.empty-state{text-align:center;padding:3rem 1rem;color:var(--text-muted)}
.empty-icon{font-size:3rem;margin-bottom:1rem;opacity:.5}
.empty-title{font-size:14px;font-weight:600;color:var(--text-sub);margin-bottom:.5rem}
.empty-desc{font-size:12px;font-family:'Space Mono',monospace;line-height:1.6;max-width:400px;margin:0 auto 1.5rem}
.mock-badge{display:inline-flex;align-items:center;gap:6px;background:#fffbe6;border:1px solid #d4a72c;color:#b8860b;padding:8px 16px;border-radius:6px;font-size:11px;font-family:'Space Mono',monospace;margin-bottom:1.5rem;cursor:pointer;transition:all .18s}
.mock-badge:hover{background:#fff3b0}
.mock-banner{background:#fffbe6;border:1px solid #d4a72c;border-radius:8px;padding:10px 16px;margin-bottom:1.25rem;display:flex;align-items:center;justify-content:space-between;font-size:11px;font-family:'Space Mono',monospace;color:#b8860b}
.mock-banner span{font-weight:700}
.bar-wrap{display:flex;flex-direction:column;gap:10px}
.bar-row{display:flex;align-items:center;gap:12px}
.bar-name{font-size:12px;font-weight:600;width:90px;flex-shrink:0;color:var(--text-sub)}
.bar-track{flex:1;height:24px;background:var(--surface2);border-radius:4px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:8px;transition:width .7s cubic-bezier(.4,0,.2,1)}
.bar-val{font-family:'Space Mono',monospace;font-size:11px;font-weight:700;color:#fff;position:relative;z-index:1}
.bar-val-out{font-family:'Space Mono',monospace;font-size:11px;color:var(--text-muted);margin-left:8px}
.footer{background:var(--green);text-align:center;padding:1.25rem;font-size:11px;font-family:'Space Mono',monospace;color:var(--gray-pink);margin-top:2rem}
</style>
</head>
<body>
<header class="hdr">
  <div class="brand">
    <span class="brand-name">ORINGO</span>
    <div class="brand-sep"></div>
    <span class="brand-sub">GBP 門市流量</span>
  </div>
  <div class="hdr-r">
    <div class="live-dot"></div>
    <div class="hclock" id="clock">--:--:--</div>
    <div class="data-tag" id="data-tag">LOADING...</div>
    <a href="index.html" class="back-btn">← 返回儀表板</a>
  </div>
</header>

<div class="container">
  <div id="mock-banner" class="mock-banner" style="display:none">
    <span>⚠ 目前顯示範例資料</span>
    <span>GAS 腳本設定完成後，GBP數據工作表有資料時將自動切換為真實數據</span>
  </div>

  <!-- Section 1: Store KPI Cards -->
  <div class="sec-hdr">
    <div class="sec-title">各店本週 GBP 指標</div>
    <div class="sec-date" id="period-label">載入中…</div>
  </div>
  <div class="g4" id="store-cards"></div>

  <!-- Section 2: Trend Chart -->
  <div class="card">
    <div class="card-hdr">
      <span class="card-lbl">各店搜尋曝光趨勢</span>
      <span class="card-badge">近 8 週</span>
    </div>
    <div class="ch260"><canvas id="trend-chart"></canvas></div>
    <div class="legend" id="trend-legend"></div>
  </div>

  <!-- Section 3: Interaction Ranking -->
  <div class="card">
    <div class="card-hdr">
      <span class="card-lbl">互動率排行</span>
      <span class="card-badge">導航 + 電話 + 網站點擊 加總</span>
    </div>
    <div id="rank-chart"></div>
  </div>
</div>

<footer class="footer">
  林果良品 ORINGO｜GBP 門市流量｜每週一自動更新
  <span style="opacity:.4;font-size:10px;display:block;margin-top:3px">INTERNAL USE ONLY · ©2026 ORINGO</span>
</footer>

<script>
const SHEET_ID = '17hTgCpF0mBTHf3RcnDmRFrJMeLBn3nRdTMuG8l58QjY';
const STORES_GBP = ['台北松菸店','台北東門店','台北中山店','台中園道店'];
const S_COL = ['#284234','#5a8a6e','#A54A1A','#8D5531'];
const S_EMO = ['🌿','🚪','🏙️','🏔️'];
const fw = n => Math.round(n).toLocaleString('zh-TW');

/* Mock data — 8 weeks × 4 stores */
const MOCK_WEEKS = ['W09','W10','W11','W12','W13','W14','W15','W16'];
const MOCK_LATEST = [
  ['2026/04/21','2026/04/14-04/20','台北松菸店',1250,890,45,28,72,58.4,41.6],
  ['2026/04/21','2026/04/14-04/20','台北東門店',980,720,38,22,55,57.6,42.4],
  ['2026/04/21','2026/04/14-04/20','台北中山店',1420,1050,62,35,88,57.5,42.5],
  ['2026/04/21','2026/04/14-04/20','台中園道店',850,620,32,18,48,57.8,42.2],
];
const MOCK_TREND = {
  '台北松菸店': [1080,1120,1150,1190,1200,1220,1230,1250],
  '台北東門店': [880, 910, 940, 950, 960, 970,975,980],
  '台北中山店': [1280,1310,1340,1360,1380,1400,1410,1420],
  '台中園道店': [760, 790, 800, 815, 820, 830, 840, 850],
};

let trendChart = null;
let hiddenDatasets = new Set();
let currentData = [];
let trendData = {};

let _seq = 0;
function loadGviz(sheetName) {
  return new Promise((resolve, reject) => {
    const cb = '_gbpCb' + (++_seq);
    window[cb] = function(resp) {
      delete window[cb];
      const rows = (resp.table.rows || []).map(r =>
        (r.c || []).map(cell => cell ? cell.v : null)
      );
      resolve(rows);
    };
    const s = document.createElement('script');
    s.onerror = () => { delete window[cb]; reject(new Error('Load failed: ' + sheetName)); };
    s.src = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=responseHandler:${cb}&sheet=${encodeURIComponent(sheetName)}`;
    document.head.appendChild(s);
  });
}

async function loadData() {
  let rows = [];
  let useMock = false;
  try {
    rows = await loadGviz('GBP數據');
    // Filter header row if present
    rows = rows.filter(r => r[2] && STORES_GBP.includes(r[2]));
    if (rows.length === 0) { useMock = true; }
  } catch(e) {
    console.warn('GBP data load failed, using mock:', e);
    useMock = true;
  }

  if (useMock) {
    document.getElementById('mock-banner').style.display = 'flex';
    rows = [...MOCK_LATEST];
    // Build 8-week trend from mock
    trendData = MOCK_TREND;
    currentData = getLatestPerStore(rows);
    document.getElementById('data-tag').textContent = '範例資料';
  } else {
    // Get all rows, build trend from historical weeks
    const allStoreRows = {};
    STORES_GBP.forEach(s => allStoreRows[s] = []);
    rows.forEach(r => {
      const store = r[2];
      if (STORES_GBP.includes(store)) allStoreRows[store].push(r);
    });
    // Sort each store by period (r[1]) and take last 8
    STORES_GBP.forEach(s => {
      allStoreRows[s].sort((a, b) => String(a[1]).localeCompare(String(b[1])));
      const last8 = allStoreRows[s].slice(-8);
      trendData[s] = last8.map(r => Number(r[3]) || 0);
    });
    currentData = getLatestPerStore(rows);
    const updTime = rows[0] ? rows[0][0] || '' : '';
    document.getElementById('data-tag').textContent = updTime ? '更新 ' + updTime : 'LIVE DATA';
  }

  const period = currentData[0] ? currentData[0][1] || '' : '';
  document.getElementById('period-label').textContent = period;

  renderStoreCards();
  renderTrendChart();
  renderRankChart();
}

function getLatestPerStore(rows) {
  const byStore = {};
  rows.forEach(r => {
    const s = r[2];
    if (!byStore[s] || String(r[1]) > String(byStore[s][1])) byStore[s] = r;
  });
  return STORES_GBP.map(s => byStore[s] || [null, null, s, 0, 0, 0, 0, 0, 0, 0]);
}

function renderStoreCards() {
  document.getElementById('store-cards').innerHTML = currentData.map((r, i) => {
    const [, , name, searchImp, mapImp, nav, phone, web, searchPct, mapPct] = r;
    const interactions = (nav || 0) + (phone || 0) + (web || 0);
    const sp = Number(searchPct) || 0;
    const mp = Number(mapPct) || 0;
    return `<div class="store-card" style="--sc-color:${S_COL[i]}">
      <div class="sc-name">${S_EMO[i]} ${name || STORES_GBP[i]}</div>
      <div class="sc-grid">
        <div class="sc-kpi sc-kpi-main">
          <div class="sc-kpi-l">搜尋曝光</div>
          <div class="sc-kpi-v">${fw(searchImp || 0)}</div>
        </div>
        <div class="sc-kpi">
          <div class="sc-kpi-l">地圖曝光</div>
          <div class="sc-kpi-v">${fw(mapImp || 0)}</div>
        </div>
        <div class="sc-kpi">
          <div class="sc-kpi-l">導航請求</div>
          <div class="sc-kpi-v">${fw(nav || 0)}</div>
        </div>
        <div class="sc-kpi">
          <div class="sc-kpi-l">電話點擊</div>
          <div class="sc-kpi-v">${fw(phone || 0)}</div>
        </div>
        <div class="sc-kpi">
          <div class="sc-kpi-l">網站點擊</div>
          <div class="sc-kpi-v">${fw(web || 0)}</div>
        </div>
        <div class="sc-kpi">
          <div class="sc-kpi-l">互動合計</div>
          <div class="sc-kpi-v" style="color:${S_COL[i]}">${fw(interactions)}</div>
        </div>
      </div>
      <div class="sc-ratio-label">
        <span>🔍 搜尋 ${sp.toFixed(1)}%</span>
        <span>🗺️ 地圖 ${mp.toFixed(1)}%</span>
      </div>
      <div class="sc-ratio-bar">
        <div class="ratio-search" style="width:${sp}%;background:${S_COL[i]}"></div>
        <div class="ratio-map" style="width:${mp}%"></div>
      </div>
    </div>`;
  }).join('');
}

function renderTrendChart() {
  const labels = MOCK_WEEKS;
  const datasets = STORES_GBP.map((s, i) => ({
    label: s,
    data: trendData[s] || Array(8).fill(0),
    borderColor: S_COL[i],
    backgroundColor: S_COL[i] + '18',
    borderWidth: 2,
    pointRadius: 4,
    pointBackgroundColor: S_COL[i],
    fill: false,
    tension: .4,
    hidden: hiddenDatasets.has(s),
  }));

  if (trendChart) trendChart.destroy();
  trendChart = new Chart(document.getElementById('trend-chart'), {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#fff',
          borderColor: 'rgba(40,66,52,.15)',
          borderWidth: 1,
          titleColor: '#284234',
          bodyColor: '#8D5531',
          titleFont: { family: 'Space Mono', size: 11 },
          bodyFont: { family: 'Space Mono', size: 11 },
          padding: 10,
          cornerRadius: 8,
        }
      },
      scales: {
        x: { grid: { color: 'rgba(40,66,52,.05)' }, ticks: { color: '#b09a88', font: { family: 'Space Mono', size: 10 } } },
        y: { grid: { color: 'rgba(40,66,52,.05)' }, ticks: { color: '#b09a88', font: { family: 'Space Mono', size: 10 }, callback: v => v.toLocaleString() } }
      }
    }
  });

  document.getElementById('trend-legend').innerHTML = STORES_GBP.map((s, i) =>
    `<div class="leg-i${hiddenDatasets.has(s) ? ' hidden' : ''}" onclick="toggleSeries('${s}',${i})" style="user-select:none">
      <div class="leg-dot" style="background:${S_COL[i]}"></div>${S_EMO[i]} ${s}
    </div>`
  ).join('');
}

function toggleSeries(store, idx) {
  if (hiddenDatasets.has(store)) hiddenDatasets.delete(store);
  else hiddenDatasets.add(store);
  renderTrendChart();
}

function renderRankChart() {
  const ranked = currentData.map((r, i) => ({
    name: STORES_GBP[i],
    emo: S_EMO[i],
    col: S_COL[i],
    nav: Number(r[5]) || 0,
    phone: Number(r[6]) || 0,
    web: Number(r[7]) || 0,
    total: (Number(r[5]) || 0) + (Number(r[6]) || 0) + (Number(r[7]) || 0),
  })).sort((a, b) => b.total - a.total);

  const maxVal = Math.max(...ranked.map(r => r.total), 1);

  document.getElementById('rank-chart').innerHTML = `
    <div class="bar-wrap">
      ${ranked.map((r, i) => `
        <div class="bar-row">
          <div class="bar-name">${r.emo} ${r.name}</div>
          <div class="bar-track">
            <div class="bar-fill" style="width:${(r.total/maxVal*100).toFixed(1)}%;background:${r.col}">
              <span class="bar-val">${r.total > 0 ? fw(r.total) : ''}</span>
            </div>
          </div>
          <div style="font-family:'Space Mono',monospace;font-size:10px;color:var(--text-muted);white-space:nowrap;min-width:150px">
            🧭${r.nav} 📞${r.phone} 🌐${r.web}
          </div>
        </div>
      `).join('')}
    </div>
    <div style="display:flex;gap:18px;margin-top:12px;font-size:10px;font-family:'Space Mono',monospace;color:var(--text-muted)">
      <span>🧭 導航請求</span><span>📞 電話點擊</span><span>🌐 網站點擊</span>
    </div>
  `;
}

(function tick(){
  const n = new Date();
  document.getElementById('clock').textContent = [n.getHours(), n.getMinutes(), n.getSeconds()].map(v => ('0'+v).slice(-2)).join(':');
  setTimeout(tick, 1000);
})();

loadData();
</script>
</body>
</html>
